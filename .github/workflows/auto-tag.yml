name: auto-tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-tag-main
  cancel-in-progress: false

jobs:
  create_tag:
    name: create-semver-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate tag policy from push range
        id: policy
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "$BASE" == "$ZERO_SHA" ]]; then
            BASE="$(git rev-list --max-parents=0 "$HEAD" | tail -n 1)"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE" "$HEAD" || true)"
          printf 'changed files:\n%s\n' "$CHANGED_FILES"

          if ! printf '%s\n' "$CHANGED_FILES" | grep -Fxq "VERSION"; then
            echo "VERSION unchanged in this push; skip auto-tag."
            echo "should_tag=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! printf '%s\n' "$CHANGED_FILES" | grep -Fxq "docs/release/notes.md"; then
            echo "auto-tag: VERSION changed but docs/release/notes.md was not updated in the same push." >&2
            exit 1
          fi

          VERSION="$(tr -d ' \t\r\n' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([\-][0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "auto-tag: VERSION is not valid semver: $VERSION" >&2
            exit 1
          fi

          TAG="v$VERSION"
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "auto-tag: tag already exists: $TAG" >&2
            exit 1
          fi

          echo "should_tag=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.policy.outputs.should_tag == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.policy.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "${GITHUB_SHA}" -m "release: $TAG"
          git push origin "$TAG"
