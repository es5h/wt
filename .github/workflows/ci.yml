name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  pr_body:
    name: pr-body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - name: Verify PR body contains E2E guide section
        run: go run ./scripts/check_pr_body_e2e.go

  premerge:
    name: premerge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - name: Go version
        run: go version

      - name: Pre-merge gate
        run: make premerge

  tag_semver:
    name: tag-semver
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag format and VERSION match
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(tr -d ' \t\r\n' < VERSION)"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-][0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "ci: tag must be semver with 'v' prefix (e.g. v1.2.3): $TAG" >&2
            exit 1
          fi

          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "ci: tag/version mismatch: tag=$TAG VERSION=$VERSION" >&2
            exit 1
          fi

          echo "tag/version verified: $TAG"
