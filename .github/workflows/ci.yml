name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pr_body:
    name: pr-body
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PR body contains E2E guide section
        run: python3 scripts/check_pr_body_e2e.py

  premerge:
    name: premerge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
          cache: false

      - name: Go version
        run: go version

      - name: Pre-merge gate
        run: make premerge
