name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify_and_release:
    name: verify-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag format and VERSION match
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(tr -d ' \t\r\n' < VERSION)"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-][0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release: tag must be semver with 'v' prefix (e.g. v1.2.3): $TAG" >&2
            exit 1
          fi

          if [[ "$TAG" != "v$VERSION" ]]; then
            echo "release: tag/version mismatch: tag=$TAG VERSION=$VERSION" >&2
            exit 1
          fi

          echo "tag/version verified: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
